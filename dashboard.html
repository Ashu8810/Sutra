<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sutra</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%230d0d0d%22/><text y=%22.9em%22 font-size=%2270%22 font-weight=%22900%22 font-family=%22Arial, sans-serif%22 fill=%22white%22 x=%2250%%22 text-anchor=%22middle%22>S</text></svg>">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div id="app">

    <!-- SIDEBAR -->
    <nav class="sidebar">
      <div class="brand">
        <h1>Sutra</h1>
        <span class="logo-cursor">>_</span>
      </div>

      <ul class="nav-list">
        <li class="nav-item active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          <span class="nav-text">Dashboard</span>
        </li>
        <li class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          <span class="nav-text">Calendar</span>
        </li>
        <li class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
          <span class="nav-text">Events</span>
        </li>
      </ul>

      <div class="footer">
        <div class="user-name" id="current-user-name">Ashutosh</div>
        <div class="settings" id="sign-out-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="settings-icon"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          <span class="sign-out-text">Sign Out</span>
        </div>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="content">

      <!-- HEADER -->
      <header class="content-header">
        <h2 class="page-title">Dashboard Overview</h2>
        <button class="action-btn" id="add-event-btn">Add Event</button>
      </header>

      <div class="page-content">

        <!-- DASHBOARD -->
        <div id="dashboard-container">
          <div class="stat-grid">

            <div class="stat-block">
              <div class="stat-label">Total Events</div>
              <div class="stat-value" id="stat-total">0</div>
            </div>

            <div class="stat-block">
              <div class="stat-label">Hackathons</div>
              <div class="stat-value" id="stat-hackathons">0</div>
            </div>

            <div class="stat-block">
              <div class="stat-label">Absent Days</div>
              <div class="stat-value" id="stat-absent">0</div>
            </div>

          </div>
        </div>

        <!-- EVENT LIST FILTERS -->
        <div class="list-filters" id="list-filters">
          <div class="filter-group">
            <span class="filter-label">Type</span>
            <span class="filter-option active" data-filter-type="all">All</span>
            <span class="filter-option" data-filter-type="hackathon">Hackathon</span>
            <span class="filter-option" data-filter-type="ctf">CTF</span>
            <span class="filter-option" data-filter-type="event">Event</span>
            <span class="filter-option" data-filter-type="college">College</span>
          </div>
          <div class="filter-group">
            <span class="filter-label">Status</span>
            <span class="filter-option active" data-filter-status="all">All</span>
            <span class="filter-option" data-filter-status="registered">Registered</span>
            <span class="filter-option" data-filter-status="attended">Attended</span>
            <span class="filter-option" data-filter-status="missed">Missed</span>
          </div>
          <div class="filter-group" id="date-filter-group" style="display: none;">
            <span class="filter-label">Date</span>
            <span class="filter-option active" id="date-filter-value">Selected Date</span>
            <span class="filter-option" id="clear-date-filter" style="color: #555555;">X Clear</span>
          </div>
        </div>

        <!-- EVENT LIST -->
        <div class="list-container" id="event-list-container">

          <!-- Dynamic events will render here -->

          <div class="empty-state" id="empty-state">
            No events yet
          </div>

        </div>

        <!-- EVENT FORM -->
        <div class="form-container" id="event-form-container" style="display: none;">

          <form id="event-form" class="sutra-form">

            <div class="form-group">
              <label for="event-title">Title</label>
              <input type="text" id="event-title" required />
            </div>

            <div class="form-group">
              <label for="event-type">Type</label>
              <select id="event-type">
                <option value="hackathon">Hackathon</option>
                <option value="ctf">CTF</option>
                <option value="event">Event</option>
                <option value="college">College</option>
              </select>
            </div>

            <div class="form-group">
              <label for="event-status">Status</label>
              <select id="event-status">
                <option value="registered">Registered</option>
                <option value="attended">Attended</option>
                <option value="missed">Missed</option>
              </select>
            </div>

            <div class="form-group-row">
              <div class="form-group">
                <label for="event-date">Start Date</label>
                <input type="date" id="event-date" required />
              </div>
              <div class="form-group">
                <label for="event-end-date">End Date (Optional)</label>
                <input type="date" id="event-end-date" />
              </div>
            </div>

            <div class="form-actions">
              <button type="submit" class="submit-btn" id="submit-btn">Add Event</button>
              <span class="form-feedback" id="form-feedback"></span>
            </div>

          </form>
        </div>

        <!-- CALENDAR -->
        <div id="calendar-container" style="display: none;">
          <div class="calendar-header">
            <div class="calendar-month">Month</div>
            <div class="calendar-nav">
              <button class="cal-nav-btn prev-btn" aria-label="Previous Month">&lt;</button>
              <button class="cal-nav-btn next-btn" aria-label="Next Month">&gt;</button>
            </div>
          </div>

          <div class="calendar-grid">
            <div class="calendar-day-labels">
              <div>Mon</div>
              <div>Tue</div>
              <div>Wed</div>
              <div>Thu</div>
              <div>Fri</div>
              <div>Sat</div>
              <div>Sun</div>
            </div>

            <div id="calendar-cells" class="calendar-cells"></div>
          </div>
        </div>

      </div>
    </main>
  <div id="cal-tooltip" class="cal-tooltip"></div>

  <!-- SETTINGS MODAL (MOBILE ONLY) -->
  <div id="settings-modal" class="settings-modal-overlay">
    <div class="settings-popup">
      <div class="settings-popup-header">
        <h2 id="modal-welcome-name">Welcome, User</h2>
        <span id="close-settings" class="close-icon">&times;</span>
      </div>
      <div class="settings-popup-body">
        <button id="modal-sign-out" class="sign-out-modal-btn">Sign Out</button>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script type="module" src="./main.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Sutra</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%230d0d0d%22/><text y=%22.9em%22 font-size=%2270%22 font-weight=%22900%22 font-family=%22Arial, sans-serif%22 fill=%22white%22 x=%2250%%22 text-anchor=%22middle%22>S</text></svg>">
  
  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="./style.css" />
</head>

<body class="login-body">
  <div class="login-container">
    <div class="login-header">
      <h1>Sutra</h1>
      <p>Create a new account</p>
    </div>

    <div class="oauth-section">
      <button type="button" class="oauth-btn" id="google-signup-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="currentColor"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"/>
        </svg>
        Sign up with Google
      </button>
      <div class="divider">
        <span>or</span>
      </div>
    </div>

    <form id="signup-form" class="sutra-form">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" required placeholder="John Doe" />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="john@example.com" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="••••••••" />
      </div>

      <div class="form-actions">
        <button type="submit" class="submit-btn">Create Account</button>
      </div>
    </form>

    <div class="auth-link">
      <p>Already have an account? <a href="login.html">Sign In</a></p>
    </div>
  </div>

  <script type="module" src="./signup.js"></script>
</body>
</html>
